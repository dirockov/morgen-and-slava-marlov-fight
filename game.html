<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Morgenshtern: Battle Royale</title>
    <style>
        body {
            margin: 0;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial Black', sans-serif;
            color: white;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
            border: 4px solid #333;
        }
        canvas {
            background: linear-gradient(180deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: block;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 20px;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
            z-index: 10;
        }
        #overlay {
            display: flex;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 20;
        }
        h1 { 
            font-size: 40px; 
            margin: 0 0 20px 0; 
            color: #00ffff; 
            text-transform: uppercase; 
            text-shadow: 0 0 20px #00ffff;
            font-style: italic;
        }
        p { font-size: 18px; max-width: 500px; line-height: 1.5; color: #ddd; }
        .controls {
            margin-top: 30px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
        }
        .key {
            display: inline-block;
            background: #fff;
            color: #000;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            margin: 0 5px;
        }
        button {
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            border: none;
            padding: 15px 40px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 0, 204, 0.5);
            transition: 0.3s;
        }
        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(255, 0, 204, 0.8);
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="900" height="600"></canvas>
    <div id="ui">
        УРОВЕНЬ: <span id="lvlDisplay">1</span> | 
        ЖИЗНИ: <span id="livesDisplay">3</span> | 
        ВРАГОВ ОСТАЛОСЬ: <span id="enemiesDisplay">0</span>
    </div>
    
    <div id="overlay">
        <h1 id="overlayTitle">MORGENSTERN BATTLE</h1>
        <p id="overlayText">Победи всех Слав Марлоу и доберись до выхода!</p>
        
        <div class="controls">
            <div>Движение: <span class="key">A</span> <span class="key">D</span> или <span class="key">←</span> <span class="key">→</span></div>
            <div>Прыжок: <span class="key">W</span> или <span class="key">↑</span> или <span class="key">SPACE</span></div>
            <div style="margin-top:10px; color: #ff00cc;">АТАКА: <span class="key">F</span> или <span class="key">ЛКМ</span></div>
        </div>

        <button id="startBtn" onclick="startGame()">В БОЙ!</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Элементы
    const uiLvl = document.getElementById('lvlDisplay');
    const uiLives = document.getElementById('livesDisplay');
    const uiEnemies = document.getElementById('enemiesDisplay');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayText = document.getElementById('overlayText');
    const startBtn = document.getElementById('startBtn');

    // Звуковой движок
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        const now = audioCtx.currentTime;
        
        if (type === 'jump') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.linearRampToValueAtTime(600, now + 0.1);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'hit') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, now);
            osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        } else if (type === 'attack') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'win') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.setValueAtTime(600, now + 0.2);
            osc.frequency.setValueAtTime(1000, now + 0.4);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.linearRampToValueAtTime(0, now + 1.0);
            osc.start(now); osc.stop(now + 1.0);
        }
    }

    // Игрок
    const player = {
        x: 50, y: 400, w: 40, h: 60,
        vx: 0, vy: 0,
        speed: 6, jump: -14,
        grounded: false,
        lives: 3,
        facingRight: true,
        isAttacking: false,
        attackTimer: 0,
        attackCooldown: 0,
        color: '#ff00ff',
        invincible: 0
    };

    const keys = { right: false, left: false, up: false, attack: false };
    let particles = [];
    let currentLevelIdx = 0;
    let isGameRunning = false;
    let levelData = null;

    // Конфигурация уровней
    const levels = [
        {
            // Уровень 1: Обучение бою
            platforms: [
                {x: 0, y: 550, w: 900, h: 50},
                {x: 200, y: 450, w: 150, h: 20},
                {x: 500, y: 350, w: 150, h: 20},
                {x: 750, y: 250, w: 100, h: 20}
            ],
            enemies: [
                {x: 400, y: 520, w: 40, h: 40, hp: 3, maxHp: 3, speed: 2, type: 'patrol', range: [300, 600]}
            ],
            finish: {x: 800, y: 200, w: 60, h: 50},
            start: {x: 50, y: 500}
        },
        {
            // Уровень 2: Платформинг и враги
            platforms: [
                {x: 0, y: 550, w: 200, h: 50},
                {x: 250, y: 450, w: 100, h: 20},
                {x: 400, y: 350, w: 100, h: 20},
                {x: 600, y: 250, w: 100, h: 20},
                {x: 800, y: 150, w: 100, h: 20}
            ],
            enemies: [
                {x: 250, y: 420, w: 40, h: 40, hp: 3, maxHp: 3, speed: 3, type: 'chase', range: [200, 400]},
                {x: 600, y: 220, w: 40, h: 40, hp: 3, maxHp: 3, speed: 4, type: 'patrol', range: [550, 750]}
            ],
            finish: {x: 820, y: 100, w: 60, h: 50},
            start: {x: 50, y: 500}
        },
        {
            // Уровень 3: Арена
            platforms: [
                {x: 0, y: 550, w: 900, h: 50},
                {x: 100, y: 400, w: 200, h: 20},
                {x: 600, y: 400, w: 200, h: 20},
                {x: 350, y: 250, w: 200, h: 20}
            ],
            enemies: [
                {x: 150, y: 370, w: 40, h: 40, hp: 5, maxHp: 5, speed: 5, type: 'chase', range: [0, 900]},
                {x: 650, y: 370, w: 40, h: 40, hp: 5, maxHp: 5, speed: 5, type: 'chase', range: [0, 900]},
                {x: 400, y: 220, w: 40, h: 40, hp: 4, maxHp: 4, speed: 6, type: 'patrol', range: [350, 550]}
            ],
            finish: {x: 400, y: 500, w: 100, h: 50}, // Финиш в центре внизу
            start: {x: 50, y: 500}
        },
        {
            // Уровень 4: БОСС
            platforms: [
                {x: 0, y: 550, w: 900, h: 50},
                {x: 100, y: 450, w: 100, h: 20},
                {x: 700, y: 450, w: 100, h: 20},
                {x: 400, y: 300, w: 100, h: 20}
            ],
            enemies: [
                {x: 400, y: 500, w: 60, h: 60, hp: 10, maxHp: 10, speed: 3.5, type: 'boss', range: [0, 900]}
            ],
            finish: {x: 800, y: 500, w: 60, h: 50},
            start: {x: 50, y: 500}
        }
    ];

    function initLevel(idx) {
        if (idx >= levels.length) {
            gameWin();
            return;
        }
        currentLevelIdx = idx;
        // Глубокое копирование уровня, чтобы восстанавливать HP врагов при рестарте уровня
        levelData = JSON.parse(JSON.stringify(levels[idx]));
        
        player.x = levelData.start.x;
        player.y = levelData.start.y;
        player.vx = 0;
        player.vy = 0;
        player.invincible = 0;
        
        updateUI();
    }

    function startGame() {
        overlay.classList.add('hidden');
        player.lives = 3;
        isGameRunning = true;
        initLevel(0);
        gameLoop();
    }

    function updateUI() {
        uiLvl.innerText = currentLevelIdx + 1;
        uiLives.innerText = player.lives;
        // Считаем живых врагов
        const aliveEnemies = levelData.enemies.filter(e => e.hp > 0).length;
        uiEnemies.innerText = aliveEnemies;
    }

    function createParticles(x, y, color, count, speed = 5) {
        for(let i=0; i<count; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * speed,
                vy: (Math.random() - 0.5) * speed,
                life: 1.0,
                color: color,
                size: Math.random() * 4 + 2
            });
        }
    }

    function attack() {
        if (player.attackCooldown > 0 || player.isAttacking) return;
        
        player.isAttacking = true;
        player.attackTimer = 15; // Длительность атаки в кадрах
        player.attackCooldown = 20; // Перезарядка
        playSound('attack');

        // Проверка попадания
        const attackRange = 60;
        const attackX = player.facingRight ? player.x + player.w : player.x - attackRange;
        const attackY = player.y;
        const attackW = attackRange;
        const attackH = player.h;

        levelData.enemies.forEach(enemy => {
            if (enemy.hp <= 0) return;

            // Простая проверка коллизии атаки
            if (attackX < enemy.x + enemy.w &&
                attackX + attackW > enemy.x &&
                attackY < enemy.y + enemy.h &&
                attackY + attackH > enemy.y) {
                
                // УДАР!
                enemy.hp--;
                enemy.x += player.facingRight ? 30 : -30; // Отталкивание
                enemy.y -= 10;
                createParticles(enemy.x + enemy.w/2, enemy.y + enemy.h/2, '#ff0000', 10);
                playSound('hit');
                
                if (enemy.hp <= 0) {
                    createParticles(enemy.x, enemy.y, '#ffffff', 30, 8);
                    playSound('win'); // Звук смерти врага
                }
                updateUI();
            }
        });
    }

    function update() {
        if (!isGameRunning) return;

        // --- Игрок ---
        if (keys.right) { player.vx = player.speed; player.facingRight = true; }
        else if (keys.left) { player.vx = -player.speed; player.facingRight = false; }
        else { player.vx = 0; }

        if (keys.up && player.grounded) {
            player.vy = player.jump;
            player.grounded = false;
            playSound('jump');
        }

        if (keys.attack) attack();

        // Физика игрока
        player.vy += 0.7; // Гравитация
        player.x += player.vx;
        player.y += player.vy;

        // Таймеры атаки
        if (player.isAttacking) {
            player.attackTimer--;
            if (player.attackTimer <= 0) player.isAttacking = false;
        }
        if (player.attackCooldown > 0) player.attackCooldown--;
        if (player.invincible > 0) player.invincible--;

        // Границы мира
        if (player.x < 0) player.x = 0;
        if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;
        if (player.y > canvas.height) {
            playerDie();
        }

        // Коллизия с платформами
        player.grounded = false;
        levelData.platforms.forEach(plat => {
            if (player.x < plat.x + plat.w && player.x + player.w > plat.x &&
                player.y < plat.y + plat.h && player.y + player.h > plat.y) {
                
                if (player.vy > 0 && player.y + player.h - player.vy <= plat.y) {
                    player.grounded = true;
                    player.vy = 0;
                    player.y = plat.y - player.h;
                }
            }
        });

        // --- Враги ---
        levelData.enemies.forEach(enemy => {
            if (enemy.hp <= 0) return;

            // ИИ Врага
            const distToPlayer = Math.abs((player.x + player.w/2) - (enemy.x + enemy.w/2));
            const isPlayerClose = distToPlayer < 400; // Радиус агро

            if (enemy.type === 'chase' || (enemy.type === 'boss' && isPlayerClose)) {
                // Преследование
                if (player.x > enemy.x) enemy.x += enemy.speed;
                else enemy.x -= enemy.speed;
                
                // Прыжки за игроком (простой ИИ)
                if (player.y < enemy.y - 50 && enemy.grounded) {
                     // enemy.vy = -10; // Можно добавить прыжки врагам
                }
            } else if (enemy.type === 'patrol') {
                // Патруль
                enemy.x += enemy.speed * enemy.dir;
                if (enemy.x > enemy.range[1] || enemy.x < enemy.range[0]) enemy.dir *= -1;
            }

            // Гравитация врага
            enemy.vy = (enemy.vy || 0) + 0.7;
            enemy.y += enemy.vy;
            enemy.grounded = false;

            // Коллизия врага с платформами
            levelData.platforms.forEach(plat => {
                if (enemy.x < plat.x + plat.w && enemy.x + enemy.w > plat.x &&
                    enemy.y < plat.y + plat.h && enemy.y + enemy.h > plat.y) {
                    if (enemy.vy > 0 && enemy.y + enemy.h - enemy.vy <= plat.y) {
                        enemy.grounded = true;
                        enemy.vy = 0;
                        enemy.y = plat.y - enemy.h;
                    }
                }
            });

            // Столкновение Враг -> Игрок (Урон игроку)
            if (player.x < enemy.x + enemy.w && player.x + player.w > enemy.x &&
                player.y < enemy.y + enemy.h && player.y + player.h > enemy.y) {
                
                if (player.invincible <= 0) {
                    playerDie();
                }
            }
        });

        // Финиш
        const f = levelData.finish;
        const aliveEnemies = levelData.enemies.filter(e => e.hp > 0).length;
        
        // Можно пройти уровень только если все враги биты (опционально, сейчас можно всегда)
        if (player.x < f.x + f.w && player.x + player.w > f.x &&
            player.y < f.y + f.h && player.y + player.h > f.y) {
            
            if (aliveEnemies === 0) {
                playSound('win');
                initLevel(currentLevelIdx + 1);
            } else {
                // Подсказка если враги остались
                ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
                ctx.fillRect(f.x, f.y, f.w, f.h);
            }
        }

        // Частицы
        particles.forEach((p, i) => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.2; // Гравитация частиц
            p.life -= 0.05;
            if (p.life <= 0) particles.splice(i, 1);
        });

        updateUI();
    }

    function playerDie() {
        playSound('hit');
        player.lives--;
        player.invincible = 60; // 1 секунда неуязвимости
        createParticles(player.x, player.y, '#ff00ff', 20);
        
        if (player.lives <= 0) {
            gameOver();
        } else {
            // Респавн на старте уровня
            player.x = levelData.start.x;
            player.y = levelData.start.y;
            player.vy = 0;
        }
        updateUI();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Платформы
        ctx.fillStyle = '#2a2a40';
        ctx.strokeStyle = '#00ffff';
        ctx.lineWidth = 2;
        levelData.platforms.forEach(p => {
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.strokeRect(p.x, p.y, p.w, p.h);
        });

        // Финиш
        const f = levelData.finish;
        ctx.fillStyle = `rgba(0, 255, 0, ${0.3 + Math.sin(Date.now()/200)*0.2})`;
        ctx.fillRect(f.x, f.y, f.w, f.h);
        ctx.strokeStyle = '#00ff00';
        ctx.strokeRect(f.x, f.y, f.w, f.h);
        ctx.fillStyle = '#fff';
        ctx.font = '12px Arial';
        ctx.fillText("EXIT", f.x + 15, f.y + 30);

        // Враги
        levelData.enemies.forEach(enemy => {
            if (enemy.hp <= 0) return;
            drawSlava(enemy);
        });

        // Игрок
        drawMorgen(player);

        // Частицы
        particles.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.fillRect(p.x, p.y, p.size, p.size);
            ctx.globalAlpha = 1.0;
        });
    }

    function drawMorgen(p) {
        ctx.save();
        // Мигание при уроне
        if (p.invincible > 0 && Math.floor(Date.now() / 50) % 2 === 0) {
            ctx.globalAlpha = 0.5;
        }

        const cx = p.x + p.w/2;
        const cy = p.y + p.h/2;

        // Тело
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.w, p.h);
        
        // Лицо
        ctx.fillStyle = '#ffe0bd';
        ctx.fillRect(p.x + 5, p.y + 10, p.w - 10, 25);

        // Прическа
        ctx.fillStyle = '#aa00aa';
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(cx, p.y - 20);
        ctx.lineTo(p.x + p.w, p.y);
        ctx.fill();

        // Брекеты
        ctx.fillStyle = 'white';
        ctx.fillRect(p.x + 8, p.y + 25, p.w - 16, 8);
        ctx.strokeStyle = 'silver';
        ctx.beginPath();
        ctx.moveTo(p.x + 8, p.y + 25);
        ctx.lineTo(p.x + p.w - 8, p.y + 33);
        ctx.stroke();

        // Очки
        ctx.fillStyle = 'black';
        if (p.facingRight) {
            ctx.fillRect(p.x + 20, p.y + 15, 15, 6);
        } else {
            ctx.fillRect(p.x + 5, p.y + 15, 15, 6);
        }

        // Атака (Визуальный эффект)
        if (p.isAttacking) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            const atkX = p.facingRight ? p.x + p.w : p.x - 50;
            ctx.beginPath();
            ctx.arc(atkX + (p.facingRight?25:-25), p.y + p.h/2, 30, 0, Math.PI * 2);
            ctx.fill();
            
            // Линия удара
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(p.facingRight ? p.x + p.w : p.x, p.y + p.h/2);
            ctx.lineTo(atkX + (p.facingRight?50:-50), p.y + p.h/2);
            ctx.stroke();
        }

        ctx.restore();
    }

    function drawSlava(e) {
        const cx = e.x + e.w/2;
        
        // Тело (Красное)
        ctx.fillStyle = '#cc0000';
        ctx.fillRect(e.x, e.y, e.w, e.h);

        // Лицо
        ctx.fillStyle = '#ffe0bd';
        ctx.fillRect(e.x + 5, e.y + 5, e.w - 10, 25);

        // Борода
        ctx.fillStyle = '#331100';
        ctx.beginPath();
        ctx.moveTo(e.x, e.y + 20);
        ctx.lineTo(cx, e.y + e.h - 5);
        ctx.lineTo(e.x + e.w, e.y + 20);
        ctx.fill();

        // Злые глаза
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.moveTo(e.x + 10, e.y + 15);
        ctx.lineTo(e.x + 18, e.y + 12);
        ctx.lineTo(e.x + 18, e.y + 18);
        ctx.fill();
        
        ctx.beginPath();
        ctx.moveTo(e.x + e.w - 10, e.y + 15);
        ctx.lineTo(e.x + e.w - 18, e.y + 12);
        ctx.lineTo(e.x + e.w - 18, e.y + 18);
        ctx.fill();

        // Полоска здоровья
        const hpPercent = e.hp / e.maxHp;
        ctx.fillStyle = 'red';
        ctx.fillRect(e.x, e.y - 10, e.w, 5);
        ctx.fillStyle = '#00ff00';
        ctx.fillRect(e.x, e.y - 10, e.w * hpPercent, 5);
        
        // Если босс - надпись
        if (e.type === 'boss') {
            ctx.fillStyle = 'yellow';
            ctx.font = 'bold 14px Arial';
            ctx.fillText("BOSS SLAVA", e.x - 10, e.y - 15);
        }
    }

    function gameOver() {
        isGameRunning = false;
        overlayTitle.innerText = "ТЫ ПРОИГРАЛ";
        overlayTitle.style.color = "red";
        overlayText.innerText = "Слава Марлоу захватил мир...";
        startBtn.innerText = "ПОПРОБОВАТЬ СНОВА";
        overlay.classList.remove('hidden');
    }

    function gameWin() {
        isGameRunning = false;
        overlayTitle.innerText = "ПОБЕДА!";
        overlayTitle.style.color = "#00ff00";
        overlayText.innerText = "Ты очистил город от Славы и стал легендой!";
        startBtn.innerText = "ИГРАТЬ ЕЩЕ РАЗ";
        overlay.classList.remove('hidden');
    }

    function gameLoop() {
        if (isGameRunning) {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    }

    // Управление
    document.addEventListener('keydown', (e) => {
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
        if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') keys.up = true;
        if (e.code === 'KeyF') keys.attack = true;
    });

    document.addEventListener('keyup', (e) => {
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
        if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') keys.up = false;
        if (e.code === 'KeyF') keys.attack = false;
    });

    // Атака мышкой
    canvas.addEventListener('mousedown', () => {
        if(isGameRunning) keys.attack = true;
    });
    canvas.addEventListener('mouseup', () => {
        keys.attack = false;
    });

    // Старт
    overlay.classList.remove('hidden');

</script>

</body>
</html>
