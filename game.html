<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Morgenshtern Parkour: Escape from Slava</title>
    <style>
        body {
            margin: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            color: white;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        canvas {
            background-color: #333;
            border: 4px solid #ff00ff; /* Фирменный розовый цвет */
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
        }
        #winScreen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            text-align: center;
            border: 2px solid white;
        }
        button {
            background: #ff00ff;
            border: none;
            padding: 10px 20px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #d400d4;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div id="ui">Уровень: 1 | Жизни: 3</div>
    <div id="winScreen">
        <h1>ТЫ ПОБЕДИЛ!</h1>
        <p>Слава Марлоу повержен.</p>
        <button onclick="location.reload()">Играть снова</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui');
    const winScreen = document.getElementById('winScreen');

    // Настройки игры
    const GRAVITY = 0.5;
    const SPEED = 5;
    const JUMP_FORCE = -10;

    // Игрок (Моргенштерн)
    const player = {
        x: 50,
        y: 200,
        width: 30,
        height: 50,
        dx: 0,
        dy: 0,
        grounded: false,
        color: '#ff00ff', // Розовый цвет (стиль Алишера)
        lives: 3
    };

    // Управление
    const keys = {
        right: false,
        left: false,
        up: false
    };

    // Уровень (Платформы)
    // x, y - координаты, w, h - размеры
    const platforms = [
        {x: 0, y: 350, w: 800, h: 50},   // Пол
        {x: 200, y: 280, w: 100, h: 20},
        {x: 400, y: 220, w: 100, h: 20},
        {x: 600, y: 150, w: 150, h: 20},
        {x: 50, y: 150, w: 100, h: 20}
    ];

    // Враги (Слава Марлоу)
    // Они двигаются влево-вправо
    const enemies = [
        {x: 300, y: 320, w: 30, h: 30, speed: 2, dir: 1, rangeStart: 250, rangeEnd: 500, color: '#ff0000'}, // Красный (опасный)
        {x: 620, y: 120, w: 30, h: 30, speed: 3, dir: -1, rangeStart: 600, rangeEnd: 750, color: '#ff0000'}
    ];

    // Финиш
    const finishLine = {x: 720, y: 110, w: 40, h: 40, color: '#00ff00'};

    // Слушатели нажатий
    document.addEventListener('keydown', (e) => {
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
        if ((e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') && player.grounded) {
            player.dy = JUMP_FORCE;
            player.grounded = false;
        }
    });

    document.addEventListener('keyup', (e) => {
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
    });

    function update() {
        // Движение игрока
        if (keys.right) player.dx = SPEED;
        else if (keys.left) player.dx = -SPEED;
        else player.dx = 0;

        player.dy += GRAVITY;
        player.x += player.dx;
        player.y += player.dy;

        // Границы экрана
        if (player.x < 0) player.x = 0;
        if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

        // Коллизия с платформами
        player.grounded = false;
        platforms.forEach(plat => {
            if (player.x < plat.x + plat.w &&
                player.x + player.width > plat.x &&
                player.y < plat.y + plat.h &&
                player.y + player.height > plat.y) {
                
                // Если падаем вниз и касаемся платформы
                if (player.dy > 0 && player.y + player.height - player.dy <= plat.y) {
                    player.grounded = true;
                    player.dy = 0;
                    player.y = plat.y - player.height;
                }
            }
        });

        // Логика врагов (Слава Марлоу)
        enemies.forEach(enemy => {
            enemy.x += enemy.speed * enemy.dir;
            
            // Патрулирование
            if (enemy.x > enemy.rangeEnd || enemy.x < enemy.rangeStart) {
                enemy.dir *= -1;
            }

            // Столкновение с врагом
            if (player.x < enemy.x + enemy.w &&
                player.x + player.width > enemy.x &&
                player.y < enemy.y + enemy.h &&
                player.y + player.height > enemy.y) {
                
                player.lives--;
                resetPosition();
            }
        });

        // Финиш
        if (player.x < finishLine.x + finishLine.w &&
            player.x + player.width > finishLine.x &&
            player.y < finishLine.y + finishLine.h &&
            player.y + player.height > finishLine.y) {
            
            winScreen.style.display = 'block';
        }

        // Обновление интерфейса
        ui.innerText = `Уровень: 1 | Жизни: ${player.lives}`;
        
        if (player.lives <= 0) {
            alert("Ты проиграл! Слава Марлоу победил.");
            location.reload();
        }
    }

    function resetPosition() {
        player.x = 50;
        player.y = 200;
        player.dy = 0;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Рисуем платформы
        ctx.fillStyle = '#888';
        platforms.forEach(plat => {
            ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
        });

        // Рисуем Финиш
        ctx.fillStyle = finishLine.color;
        ctx.fillRect(finishLine.x, finishLine.y, finishLine.w, finishLine.h);
        ctx.fillStyle = 'white';
        ctx.font = '10px Arial';
        ctx.fillText("EXIT", finishLine.x + 5, finishLine.y + 25);

        // Рисуем Врагов (Слава Марлоу)
        enemies.forEach(enemy => {
            ctx.fillStyle = enemy.color;
            ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);
            // Глаза (для стиля)
            ctx.fillStyle = 'black';
            ctx.fillRect(enemy.x + 5, enemy.y + 5, 5, 5);
            ctx.fillRect(enemy.x + 20, enemy.y + 5, 5, 5);
        });

        // Рисуем Игрока (Моргенштерн)
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.width, player.height);
        
        // Рисуем "Брекеты" (схематично)
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.strokeRect(player.x, player.y, player.width, player.height);
        
        // Лицо
        ctx.fillStyle = 'white';
        ctx.fillRect(player.x + 5, player.y + 10, 8, 8); // Левый глаз
        ctx.fillRect(player.x + 17, player.y + 10, 8, 8); // Правый глаз
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    // Старт игры
    gameLoop();

</script>

</body>
</html>
