<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Morgenshtern: Boss Battle</title>
    <style>
        body {
            margin: 0;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial Black', sans-serif;
            color: white;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
            border: 4px solid #333;
        }
        canvas {
            background: linear-gradient(180deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: block;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 20px;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
            z-index: 10;
        }
        #bossHealth {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 25px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #ff0000;
            border-radius: 5px;
            display: none;
            z-index: 10;
        }
        #bossHealthBar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff6600);
            transition: width 0.3s;
        }
        #bossHealthText {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            font-weight: bold;
            text-shadow: 1px 1px 0 #000;
        }
        #overlay {
            display: flex;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 20;
        }
        h1 { 
            font-size: 40px; 
            margin: 0 0 20px 0; 
            color: #00ffff; 
            text-transform: uppercase; 
            text-shadow: 0 0 20px #00ffff;
            font-style: italic;
        }
        p { font-size: 18px; max-width: 500px; line-height: 1.5; color: #ddd; }
        .controls {
            margin-top: 30px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
        }
        .key {
            display: inline-block;
            background: #fff;
            color: #000;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            margin: 0 5px;
        }
        button {
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            border: none;
            padding: 15px 40px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 0, 204, 0.5);
            transition: 0.3s;
        }
        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(255, 0, 204, 0.8);
        }
        .hidden { display: none !important; }
        .phase-indicator {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: bold;
            color: #ff0000;
            text-shadow: 0 0 20px #ff0000;
            display: none;
            z-index: 10;
        }
    </style>
</head>

<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="900" height="600"></canvas>
    <div id="ui">
        УРОВЕНЬ: <span id="lvlDisplay">1</span> | 
        ЖИЗНИ: <span id="livesDisplay">3</span> | 
        ВРАГОВ: <span id="enemiesDisplay">0</span>
    </div>
    <div id="bossHealth">
        <div id="bossHealthBar"></div>
        <div id="bossHealthText">BOSS SLAVA</div>
    </div>
    <div id="phaseIndicator" class="phase-indicator">⚠️ ФАЗА 2 ⚠️</div>
    
    <div id="overlay">
        <h1 id="overlayTitle">MORGENSTERN BATTLE</h1>
        <p id="overlayText">Победи всех Слав Марлоу и УНИЧТОЖЬ БОССА!</p>
        
        <div class="controls">
            <div>Движение: <span class="key">A</span> <span class="key">D</span> или <span class="key">←</span> <span class="key">→</span></div>
            <div>Прыжок: <span class="key">W</span> или <span class="key">↑</span> или <span class="key">SPACE</span></div>
            <div style="margin-top:10px; color: #00ffff;">БРОСОК: <span class="key">F</span> или <span class="key">ЛКМ</span></div>
            <div style="margin-top:10px; color: #ffff00;">⭐ ДВОЙНОЙ ПРЫЖОК: прыгни ещё раз в воздухе!</div>
            <div style="margin-top:10px; color: #ff0000;">⚔️ БОСС: Атакует и меняет фазы!</div>
        </div>

        <button id="startBtn" onclick="startGame()">В БОЙ!</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const uiLvl = document.getElementById('lvlDisplay');
    const uiLives = document.getElementById('livesDisplay');
    const uiEnemies = document.getElementById('enemiesDisplay');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayText = document.getElementById('overlayText');
    const startBtn = document.getElementById('startBtn');
    const bossHealth = document.getElementById('bossHealth');
    const bossHealthBar = document.getElementById('bossHealthBar');
    const bossHealthText = document.getElementById('bossHealthText');
    const phaseIndicator = document.getElementById('phaseIndicator');

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        const now = audioCtx.currentTime;
        
        if (type === 'jump') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.linearRampToValueAtTime(600, now + 0.1);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'doubleJump') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.linearRampToValueAtTime(800, now + 0.15);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.15);
            osc.start(now); osc.stop(now + 0.15);
        } else if (type === 'hit') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, now);
            osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        } else if (type === 'throw') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(600, now);
            osc.frequency.exponentialRampToValueAtTime(1000, now + 0.15);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.15);
            osc.start(now); osc.stop(now + 0.15);
        } else if (type === 'bossThrow') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'bossDash') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.linearRampToValueAtTime(300, now + 0.2);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        } else if (type === 'phaseChange') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.setValueAtTime(500, now + 0.3);
            osc.frequency.setValueAtTime(800, now + 0.6);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.linearRampToValueAtTime(0, now + 1.0);
            osc.start(now); osc.stop(now + 1.0);
        } else if (type === 'win') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.setValueAtTime(600, now + 0.2);
            osc.frequency.setValueAtTime(1000, now + 0.4);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.linearRampToValueAtTime(0, now + 1.0);
            osc.start(now); osc.stop(now + 1.0);
        } else if (type === 'respawn') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.linearRampToValueAtTime(400, now + 0.3);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'warning') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.linearRampToValueAtTime(600, now + 0.5);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.5);
            osc.start(now); osc.stop(now + 0.5);
        }
    }

    const player = {
        x: 50, y: 400, w: 40, h: 60,
        vx: 0, vy: 0,
        speed: 7, jump: -14,
        grounded: false,
        lives: 3,
        facingRight: true,
        throwCooldown: 0,
        color: '#ff00ff',
        invincible: 0,
        jumpCount: 0,
        maxJumps: 2
    };

    let projectiles = [];
    let bossProjectiles = [];
    const keys = { right: false, left: false, up: false, throw: false };
    let particles = [];
    let currentLevelIdx = 0;
    let isGameRunning = false;
    let levelData = null;

    const levels = [
        {
            platforms: [
                {x: 0, y: 550, w: 900, h: 50},
                {x: 200, y: 450, w: 150, h: 20},
                {x: 500, y: 350, w: 150, h: 20},
                {x: 750, y: 250, w: 100, h: 20}
            ],
            enemies: [
                {x: 700, y: 510, w: 40, h: 40, hp: 3, maxHp: 3, speed: 1.5, type: 'patrol', dir: -1, vy: 0, grounded: false, startX: 700, startY: 510, respawnInvincible: 0, platformIndex: 0},
                {x: 250, y: 410, w: 40, h: 40, hp: 3, maxHp: 3, speed: 1.5, type: 'patrol', dir: 1, vy: 0, grounded: false, startX: 250, startY: 410, respawnInvincible: 0, platformIndex: 1}
            ],
            finish: {x: 800, y: 200, w: 60, h: 50},
            start: {x: 50, y: 480}
        },
        {
            platforms: [
                {x: 0, y: 550, w: 200, h: 50},
                {x: 250, y: 450, w: 100, h: 20},
                {x: 450, y: 350, w: 100, h: 20},
                {x: 650, y: 250, w: 100, h: 20},
                {x: 800, y: 150, w: 100, h: 20}
            ],
            enemies: [
                {x: 700, y: 210, w: 40, h: 40, hp: 3, maxHp: 3, speed: 1.5, type: 'patrol', dir: -1, vy: 0, grounded: false, startX: 700, startY: 210, respawnInvincible: 0, platformIndex: 3},
                {x: 300, y: 410, w: 40, h: 40, hp: 3, maxHp: 3, speed: 1.5, type: 'patrol', dir: 1, vy: 0, grounded: false, startX: 300, startY: 410, respawnInvincible: 0, platformIndex: 1},
                {x: 850, y: 110, w: 40, h: 40, hp: 3, maxHp: 3, speed: 1.5, type: 'patrol', dir: -1, vy: 0, grounded: false, startX: 850, startY: 110, respawnInvincible: 0, platformIndex: 4}
            ],
            finish: {x: 820, y: 100, w: 60, h: 50},
            start: {x: 50, y: 480}
        },
        {
            platforms: [
                {x: 0, y: 550, w: 900, h: 50},
                {x: 100, y: 400, w: 200, h: 20},
                {x: 600, y: 400, w: 200, h: 20},
                {x: 350, y: 250, w: 200, h: 20}
            ],
            enemies: [
                {x: 700, y: 360, w: 40, h: 40, hp: 4, maxHp: 4, speed: 2, type: 'patrol', dir: -1, vy: 0, grounded: false, startX: 700, startY: 360, respawnInvincible: 0, platformIndex: 2},
                {x: 150, y: 360, w: 40, h: 40, hp: 4, maxHp: 4, speed: 2, type: 'patrol', dir: 1, vy: 0, grounded: false, startX: 150, startY: 360, respawnInvincible: 0, platformIndex: 1},
                {x: 400, y: 210, w: 40, h: 40, hp: 3, maxHp: 3, speed: 2.5, type: 'patrol', dir: 1, vy: 0, grounded: false, startX: 400, startY: 210, respawnInvincible: 0, platformIndex: 3}
            ],
            finish: {x: 400, y: 500, w: 100, h: 50},
            start: {x: 50, y: 480}
        },
        {
            platforms: [
                {x: 0, y: 550, w: 900, h: 50},
                {x: 100, y: 450, w: 100, h: 20},
                {x: 700, y: 450, w: 100, h: 20},
                {x: 400, y: 300, w: 100, h: 20}
            ],
            enemies: [
                {x: 400, y: 490, w: 60, h: 60, hp: 15, maxHp: 15, speed: 2, type: 'boss', dir: 1, vy: 0, grounded: false, 
                 startX: 400, startY: 490, respawnInvincible: 0, platformIndex: 0,
                 attackCooldown: 0, dashCooldown: 0, phase: 1, attackWarning: 0}
            ],
            finish: {x: 800, y: 500, w: 60, h: 50},
            start: {x: 50, y: 480}
        }
    ];

    function initLevel(idx) {
        if (idx >= levels.length) {
            gameWin();
            return;
        }
        currentLevelIdx = idx;
        levelData = JSON.parse(JSON.stringify(levels[idx]));
        
        player.x = levelData.start.x;
        player.y = levelData.start.y;
        player.vx = 0;
        player.vy = 0;
        player.invincible = 0;
        player.throwCooldown = 0;
        player.jumpCount = 0;
        
        projectiles = [];
        bossProjectiles = [];
        particles = [];
        
        // Показываем полоску здоровья босса только на 4 уровне
        if (currentLevelIdx === 3) {
            bossHealth.style.display = 'block';
        } else {
            bossHealth.style.display = 'none';
            phaseIndicator.style.display = 'none';
        }
        
        updateUI();
        updateBossHealthUI();
    }

    function startGame() {
        overlay.classList.add('hidden');
        player.lives = 3;
        isGameRunning = true;
        initLevel(0);
        gameLoop();
    }

    function updateUI() {
        uiLvl.innerText = currentLevelIdx + 1;
        uiLives.innerText = player.lives;
        const aliveEnemies = levelData.enemies.filter(e => e.hp > 0).length;
        uiEnemies.innerText = aliveEnemies;
    }

    function updateBossHealthUI() {
        if (currentLevelIdx === 3) {
            const boss = levelData.enemies.find(e => e.type === 'boss' && e.hp > 0);
            if (boss) {
                const percent = (boss.hp / boss.maxHp) * 100;
                bossHealthBar.style.width = percent + '%';
                
                // Цвет меняется от фазы
                if (percent > 70) {
                    bossHealthBar.style.background = 'linear-gradient(90deg, #ff0000, #ff6600)';
                } else if (percent > 40) {
                    bossHealthBar.style.background = 'linear-gradient(90deg, #ff6600, #ffff00)';
                } else {
                    bossHealthBar.style.background = 'linear-gradient(90deg, #ff0000, #ff00ff)';
                }
            }
        }
    }

    function createParticles(x, y, color, count, speed = 5) {
        for(let i=0; i<count; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * speed,
                vy: (Math.random() - 0.5) * speed,
                life: 1.0,
                color: color,
                size: Math.random() * 4 + 2
            });
        }
    }

    function jump() {
        if (player.jumpCount < player.maxJumps) {
            player.vy = player.jump;
            player.jumpCount++;
            player.grounded = false;
            
            if (player.jumpCount === 1) {
                playSound('jump');
                createParticles(player.x + player.w/2, player.y + player.h, '#ff00ff', 5, 3);
            } else {
                playSound('doubleJump');
                createParticles(player.x + player.w/2, player.y + player.h, '#00ffff', 15, 6);
            }
        }
    }

    function throwProjectile() {
        if (player.throwCooldown > 0) return;
        
        player.throwCooldown = 15;
        playSound('throw');

        projectiles.push({
            x: player.facingRight ? player.x + player.w : player.x,
            y: player.y + player.h / 2,
            vx: player.facingRight ? 15 : -15,
            vy: 0,
            w: 15,
            h: 15,
            life: 150
        });
    }

    // === УМНЫЙ ИИ БОССА ===
    function updateBossAI(boss, platforms) {
        // Определение фазы по здоровью
        const hpPercent = boss.hp / boss.maxHp;
        let newPhase = 1;
        if (hpPercent <= 0.4) newPhase = 3;
        else if (hpPercent <= 0.7) newPhase = 2;
        
        if (newPhase !== boss.phase) {
            boss.phase = newPhase;
            playSound('phaseChange');
            phaseIndicator.style.display = 'block';
            phaseIndicator.innerText = `⚠️ ФАЗА ${boss.phase} ⚠️`;
            setTimeout(() => { phaseIndicator.style.display = 'none'; }, 2000);
            createParticles(boss.x + boss.w/2, boss.y + boss.h/2, '#ff0000', 30, 10);
        }

        // Скорость зависит от фазы
        const speedMultiplier = 1 + (boss.phase - 1) * 0.3;
        
        // Таймеры атак
        if (boss.attackCooldown > 0) boss.attackCooldown--;
        if (boss.dashCooldown > 0) boss.dashCooldown--;
        if (boss.attackWarning > 0) boss.attackWarning--;

        // Частота атак зависит от фазы
        const attackInterval = 120 - (boss.phase * 20); // Фаза 1: 100, Фаза 2: 80, Фаза 3: 60
        const dashInterval = 200 - (boss.phase * 40); // Фаза 1: 160, Фаза 2: 120, Фаза 3: 80

        // Атака 1: Бросок снаряда
        if (boss.attackCooldown <= 0) {
            boss.attackWarning = 30; // Предупреждение за 0.5 сек
            playSound('warning');
            boss.attackCooldown = attackInterval;
        }

        if (boss.attackWarning <= 0 && boss.attackCooldown > attackInterval - 30) {
            // Бросаем снаряд в игрока
            const dx = player.x - boss.x;
            const dy = player.y - boss.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const speed = 5 + boss.phase; // Быстрее с каждой фазой
            
            bossProjectiles.push({
                x: boss.x + boss.w/2,
                y: boss.y + boss.h/2,
                vx: (dx / dist) * speed,
                vy: (dy / dist) * speed,
                w: 20,
                h: 20,
                life: 200
            });
            playSound('bossThrow');
        }

        // Атака 2: Рывок (только фаза 2 и 3)
        if (boss.phase >= 2 && boss.dashCooldown <= 0) {
            boss.dashCooldown = dashInterval;
            
            // Рывок к игроку
            const dashSpeed = (6 + boss.phase * 2) * speedMultiplier;
            const dashDir = player.x > boss.x ? 1 : -1;
            boss.x += dashDir * dashSpeed * 10; // Быстрое перемещение
            
            playSound('bossDash');
            createParticles(boss.x + boss.w/2, boss.y + boss.h/2, '#ff0000', 20, 8);
        }

        // Движение к игроку (медленное преследование)
        const distToPlayer = Math.abs(player.x - boss.x);
        if (distToPlayer > 100) {
            boss.x += (player.x > boss.x ? 1 : -1) * boss.speed * speedMultiplier * 0.5;
        }

        // Не даём уйти за границы арены
        if (boss.x < 50) boss.x = 50;
        if (boss.x > canvas.width - 50 - boss.w) boss.x = canvas.width - 50 - boss.w;

        // Гравитация
        boss.vy = (boss.vy || 0) + 0.7;
        boss.y += boss.vy;
        boss.grounded = false;

        // Коллизия с платформами
        platforms.forEach(plat => {
            if (boss.x < plat.x + plat.w && boss.x + boss.w > plat.x &&
                boss.y < plat.y + plat.h && boss.y + boss.h > plat.y) {
                if (boss.vy > 0 && boss.y + boss.h - boss.vy <= plat.y) {
                    boss.grounded = true;
                    boss.vy = 0;
                    boss.y = plat.y - boss.h;
                }
            }
        });
    }

    function checkEdgeAhead(enemy, platforms) {
        const checkDistance = 25;
        const checkY = enemy.y + enemy.h + 5;
        
        let groundAhead = false;
        
        platforms.forEach(plat => {
            const aheadX = enemy.dir > 0 ? enemy.x + enemy.w + checkDistance : enemy.x - checkDistance;
            
            if (aheadX >= plat.x && aheadX <= plat.x + plat.w &&
                checkY >= plat.y && checkY <= plat.y + plat.h) {
                groundAhead = true;
            }
        });
        
        return groundAhead;
    }

    function updateEnemyAI(enemy, platforms) {
        if (!checkEdgeAhead(enemy, platforms)) {
            enemy.dir *= -1;
            return;
        }
        
        const plat = platforms[enemy.platformIndex];
        if (plat) {
            if (enemy.x <= plat.x + 5) {
                enemy.dir = 1;
            } else if (enemy.x + enemy.w >= plat.x + plat.w - 5) {
                enemy.dir = -1;
            }
        }
    }

    function update() {
        if (!isGameRunning) return;

        // === ИГРОК ===
        if (keys.right) { player.vx = player.speed; player.facingRight = true; }
        else if (keys.left) { player.vx = -player.speed; player.facingRight = false; }
        else { player.vx = 0; }

        if (keys.up) {
            jump();
            keys.up = false;
        }

        if (keys.throw) throwProjectile();

        player.vy += 0.7;
        player.x += player.vx;
        player.y += player.vy;

        if (player.throwCooldown > 0) player.throwCooldown--;
        if (player.invincible > 0) player.invincible--;

        if (player.x < 0) player.x = 0;
        if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;
        if (player.y > canvas.height) {
            playerDie();
        }

        player.grounded = false;
        levelData.platforms.forEach(plat => {
            if (player.x < plat.x + plat.w && player.x + player.w > plat.x &&
                player.y < plat.y + plat.h && player.y + player.h > plat.y) {
                
                if (player.vy > 0 && player.y + player.h - player.vy <= plat.y) {
                    player.grounded = true;
                    player.vy = 0;
                    player.y = plat.y - player.h;
                    player.jumpCount = 0;
                }
            }
        });

        // === СНАРЯДЫ ИГРОКА ===
        for (let i = projectiles.length - 1; i >= 0; i--) {
            let proj = projectiles[i];
            proj.x += proj.vx;
            proj.y += proj.vy;
            proj.life--;

            if (proj.life <= 0 || proj.x < 0 || proj.x > canvas.width) {
                projectiles.splice(i, 1);
                continue;
            }

            levelData.enemies.forEach(enemy => {
                if (enemy.hp <= 0 || enemy.respawnInvincible > 0) return;

                if (proj.x < enemy.x + enemy.w && proj.x + proj.w > enemy.x &&
                    proj.y < enemy.y + enemy.h && proj.y + proj.h > enemy.y) {
                    
                    enemy.hp--;
                    enemy.x += proj.vx > 0 ? 20 : -20;
                    createParticles(enemy.x + enemy.w/2, enemy.y + enemy.h/2, '#00ffff', 8);
                    playSound('hit');
                    
                    projectiles.splice(i, 1);
                    
                    if (enemy.hp <= 0) {
                        createParticles(enemy.x, enemy.y, '#ffffff', 30, 8);
                        playSound('win');
                    }
                    updateUI();
                    updateBossHealthUI();
                }
            });
        }

        // === СНАРЯДЫ БОССА ===
        for (let i = bossProjectiles.length - 1; i >= 0; i--) {
            let proj = bossProjectiles[i];
            proj.x += proj.vx;
            proj.y += proj.vy;
            proj.life--;

            if (proj.life <= 0 || proj.x < 0 || proj.x > canvas.width || proj.y < 0 || proj.y > canvas.height) {
                bossProjectiles.splice(i, 1);
                continue;
            }

            // Попадание в игрока
            if (player.invincible <= 0 &&
                proj.x < player.x + player.w && proj.x + proj.w > player.x &&
                proj.y < player.y + player.h && proj.y + proj.h > player.y) {
                
                playerDie();
                bossProjectiles.splice(i, 1);
                createParticles(player.x + player.w/2, player.y + player.h/2, '#ff0000', 15, 6);
            }
        }

        // === ВРАГИ ===
        levelData.enemies.forEach(enemy => {
            if (enemy.hp <= 0) return;

            if (enemy.respawnInvincible > 0) {
                enemy.respawnInvincible--;
            }

            // БОСС с умным ИИ
            if (enemy.type === 'boss') {
                updateBossAI(enemy, levelData.platforms);
            } else {
                updateEnemyAI(enemy, levelData.platforms);
                enemy.x += enemy.speed * enemy.dir;
            }

            // Гравитация для обычных врагов
            if (enemy.type !== 'boss') {
                enemy.vy = (enemy.vy || 0) + 0.7;
                enemy.y += enemy.vy;
                enemy.grounded = false;

                levelData.platforms.forEach(plat => {
                    if (enemy.x < plat.x + plat.w && enemy.x + enemy.w > plat.x &&
                        enemy.y < plat.y + plat.h && enemy.y + enemy.h > plat.y) {
                        if (enemy.vy > 0 && enemy.y + enemy.h - enemy.vy <= plat.y) {
                            enemy.grounded = true;
                            enemy.vy = 0;
                            enemy.y = plat.y - enemy.h;
                        }
                    }
                });
            }

            if (enemy.y > canvas.height + 50) {
                enemy.x = enemy.startX;
                enemy.y = enemy.startY;
                enemy.vy = 0;
                enemy.respawnInvincible = 120;
                playSound('respawn');
                createParticles(enemy.x, enemy.y, '#ffff00', 15);
            }

            // Столкновение с игроком
            if (enemy.respawnInvincible <= 0 && enemy.type !== 'boss' &&
                player.x < enemy.x + enemy.w && player.x + player.w > enemy.x &&
                player.y < enemy.y + enemy.h && player.y + player.h > enemy.y) {
                
                if (player.invincible <= 0) {
                    playerDie();
                }
            }
        });

        // === ФИНИШ ===
        const f = levelData.finish;
        const aliveEnemies = levelData.enemies.filter(e => e.hp > 0).length;
        
        if (player.x < f.x + f.w && player.x + player.w > f.x &&
            player.y < f.y + f.h && player.y + player.h > f.y) {
            
            if (aliveEnemies === 0) {
                playSound('win');
                initLevel(currentLevelIdx + 1);
            }
        }

        // Частицы
        particles.forEach((p, i) => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.2;
            p.life -= 0.05;
            if (p.life <= 0) particles.splice(i, 1);
        });

        updateUI();
        updateBossHealthUI();
    }

    function playerDie() {
        playSound('hit');
        player.lives--;
        player.invincible = 60;
        createParticles(player.x, player.y, '#ff00ff', 20);
        
        if (player.lives <= 0) {
            gameOver();
        } else {
            player.x = levelData.start.x;
            player.y = levelData.start.y;
            player.vy = 0;
            player.jumpCount = 0;
            projectiles = [];
            bossProjectiles = [];
        }
        updateUI();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Платформы
        ctx.fillStyle = '#2a2a40';
        ctx.strokeStyle = '#00ffff';
        ctx.lineWidth = 2;
        levelData.platforms.forEach(p => {
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.strokeRect(p.x, p.y, p.w, p.h);
        });

        // Финиш
        const f = levelData.finish;
        ctx.fillStyle = `rgba(0, 255, 0, ${0.3 + Math.sin(Date.now()/200)*0.2})`;
        ctx.fillRect(f.x, f.y, f.w, f.h);
        ctx.strokeStyle = '#00ff00';
        ctx.strokeRect(f.x, f.y, f.w, f.h);
        ctx.fillStyle = '#fff';
        ctx.font = '12px Arial';
        ctx.fillText("EXIT", f.x + 15, f.y + 30);

        // Снаряды игрока
        projectiles.forEach(proj => {
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ffff';
            ctx.fillStyle = '#00ffff';
            ctx.beginPath();
            ctx.arc(proj.x + proj.w/2, proj.y + proj.h/2, proj.w/2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        });

        // Снаряды босса
        bossProjectiles.forEach(proj => {
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ff0000';
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.arc(proj.x + proj.w/2, proj.y + proj.h/2, proj.w/2, 0, Math.PI * 2);
            ctx.fill();
            
            // warning ring
            ctx.strokeStyle = '#ff6600';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.shadowBlur = 0;
        });

        // Враги
        levelData.enemies.forEach(enemy => {
            if (enemy.hp <= 0) return;
            if (enemy.type === 'boss') {
                drawBoss(enemy);
            } else {
                drawSlava(enemy);
            }
        });

        // Игрок
        drawMorgen(player);

        // Частицы
        particles.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.fillRect(p.x, p.y, p.size, p.size);
            ctx.globalAlpha = 1.0;
        });
    }

    function drawMorgen(p) {
        ctx.save();
        if (p.invincible > 0 && Math.floor(Date.now() / 50) % 2 === 0) {
            ctx.globalAlpha = 0.5;
        }

        const cx = p.x + p.w/2;

        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.w, p.h);
        
        ctx.fillStyle = '#ffe0bd';
        ctx.fillRect(p.x + 5, p.y + 10, p.w - 10, 25);

        ctx.fillStyle = '#aa00aa';
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(cx, p.y - 20);
        ctx.lineTo(p.x + p.w, p.y);
        ctx.fill();

        ctx.fillStyle = 'white';
        ctx.fillRect(p.x + 8, p.y + 25, p.w - 16, 8);
        ctx.strokeStyle = 'silver';
        ctx.beginPath();
        ctx.moveTo(p.x + 8, p.y + 25);
        ctx.lineTo(p.x + p.w - 8, p.y + 33);
        ctx.stroke();

        ctx.fillStyle = 'black';
        if (p.facingRight) {
            ctx.fillRect(p.x + 20, p.y + 15, 15, 6);
        } else {
            ctx.fillRect(p.x + 5, p.y + 15, 15, 6);
        }

        if (p.throwCooldown > 0) {
            ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
            ctx.fillRect(p.x, p.y - 15, p.w, 5);
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(p.x, p.y - 15, p.w * (1 - p.throwCooldown/15), 5);
        }

        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.fillRect(p.x, p.y - 25, p.w, 5);
        for (let i = 0; i < p.maxJumps; i++) {
            if (i < p.maxJumps - p.jumpCount) {
                ctx.fillStyle = '#00ffff';
                ctx.fillRect(p.x + 2 + i * 22, p.y - 24, 18, 3);
            }
        }

        ctx.restore();
    }

    function drawSlava(e) {
        const cx = e.x + e.w/2;
        
        ctx.save();
        if (e.respawnInvincible > 0 && Math.floor(Date.now() / 50) % 2 === 0) {
            ctx.globalAlpha = 0.4;
        }

        ctx.fillStyle = '#cc0000';
        ctx.fillRect(e.x, e.y, e.w, e.h);

        ctx.fillStyle = '#ffe0bd';
        ctx.fillRect(e.x + 5, e.y + 5, e.w - 10, 25);

        ctx.fillStyle = '#331100';
        ctx.beginPath();
        ctx.moveTo(e.x, e.y + 20);
        ctx.lineTo(cx, e.y + e.h - 5);
        ctx.lineTo(e.x + e.w, e.y + 20);
        ctx.fill();

        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.moveTo(e.x + 10, e.y + 15);
        ctx.lineTo(e.x + 18, e.y + 12);
        ctx.lineTo(e.x + 18, e.y + 18);
        ctx.fill();
        
        ctx.beginPath();
        ctx.moveTo(e.x + e.w - 10, e.y + 15);
        ctx.lineTo(e.x + e.w - 18, e.y + 12);
        ctx.lineTo(e.x + e.w - 18, e.y + 18);
        ctx.fill();

        const hpPercent = e.hp / e.maxHp;
        ctx.fillStyle = 'red';
        ctx.fillRect(e.x, e.y - 10, e.w, 5);
        ctx.fillStyle = '#00ff00';
        ctx.fillRect(e.x, e.y - 10, e.w * hpPercent, 5);

        ctx.restore();
    }

    function drawBoss(boss) {
        const cx = boss.x + boss.w/2;
        
        ctx.save();
        
        // Мигание при предупреждении атаки
        if (boss.attackWarning > 0 && Math.floor(Date.now() / 50) % 2 === 0) {
            ctx.globalAlpha = 0.5 + Math.random() * 0.5;
        }

        // Цвет зависит от фазы
        if (boss.phase === 1) {
            ctx.fillStyle = '#cc0000';
        } else if (boss.phase === 2) {
            ctx.fillStyle = '#ff6600';
        } else {
            ctx.fillStyle = '#ff00ff';
        }
        
        ctx.fillRect(boss.x, boss.y, boss.w, boss.h);

        // Лицо
        ctx.fillStyle = '#ffe0bd';
        ctx.fillRect(boss.x + 8, boss.y + 8, boss.w - 16, 30);

        // Борода (больше чем у обычных)
        ctx.fillStyle = '#331100';
        ctx.beginPath();
        ctx.moveTo(boss.x, boss.y + 25);
        ctx.lineTo(cx, boss.y + boss.h - 8);
        ctx.lineTo(boss.x + boss.w, boss.y + 25);
        ctx.fill();

        // Злые глаза (светятся в фазе 3)
        if (boss.phase === 3) {
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff0000';
        }
        ctx.fillStyle = '#ff0000';
        ctx.beginPath();
        ctx.moveTo(boss.x + 15, boss.y + 20);
        ctx.lineTo(boss.x + 25, boss.y + 15);
        ctx.lineTo(boss.x + 25, boss.y + 25);
        ctx.fill();
        
        ctx.beginPath();
        ctx.moveTo(boss.x + boss.w - 15, boss.y + 20);
        ctx.lineTo(boss.x + boss.w - 25, boss.y + 15);
        ctx.lineTo(boss.x + boss.w - 25, boss.y + 25);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Корона босса
        ctx.fillStyle = '#ffd700';
        ctx.beginPath();
        ctx.moveTo(boss.x, boss.y);
        ctx.lineTo(boss.x + 10, boss.y - 15);
        ctx.lineTo(boss.x + 20, boss.y);
        ctx.lineTo(boss.x + boss.w/2, boss.y - 20);
        ctx.lineTo(boss.x + boss.w - 20, boss.y);
        ctx.lineTo(boss.x + boss.w - 10, boss.y - 15);
        ctx.lineTo(boss.x + boss.w, boss.y);
        ctx.fill();

        // Полоска здоровья
        const hpPercent = boss.hp / boss.maxHp;
        ctx.fillStyle = 'red';
        ctx.fillRect(boss.x, boss.y - 20, boss.w, 6);
        ctx.fillStyle = boss.phase === 3 ? '#ff00ff' : '#00ff00';
        ctx.fillRect(boss.x, boss.y - 20, boss.w * hpPercent, 6);
        
        // Индикатор фазы
        ctx.fillStyle = '#ffff00';
        ctx.font = 'bold 12px Arial';
        ctx.fillText(`ФАЗА ${boss.phase}`, boss.x + 5, boss.y - 25);

        // Индикатор атаки
        if (boss.attackWarning > 0) {
            ctx.fillStyle = 'rgba(255, 0, 0, 0.7)';
            ctx.beginPath();
            ctx.arc(cx, boss.y + boss.h/2, 50, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 16px Arial';
            ctx.fillText('⚠️', cx - 10, boss.y + boss.h/2 + 5);
        }

        ctx.restore();
    }

    function gameOver() {
        isGameRunning = false;
        bossHealth.style.display = 'none';
        phaseIndicator.style.display = 'none';
        overlayTitle.innerText = "ТЫ ПРОИГРАЛ";
        overlayTitle.style.color = "red";
        overlayText.innerText = "Слава Марлоу захватил мир...";
        startBtn.innerText = "ПОПРОБОВАТЬ СНОВА";
        overlay.classList.remove('hidden');
    }

    function gameWin() {
        isGameRunning = false;
        bossHealth.style.display = 'none';
        phaseIndicator.style.display = 'none';
        overlayTitle.innerText = "ПОБЕДА!";
        overlayTitle.style.color = "#00ff00";
        overlayText.innerText = "Ты очистил город от Славы и стал легендой!";
        startBtn.innerText = "ИГРАТЬ ЕЩЕ РАЗ";
        overlay.classList.remove('hidden');
    }

    function gameLoop() {
        if (isGameRunning) {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
        if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') keys.up = true;
        if (e.code === 'KeyF') keys.throw = true;
    });

    document.addEventListener('keyup', (e) => {
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
        if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') keys.up = false;
        if (e.code === 'KeyF') keys.throw = false;
    });

    canvas.addEventListener('mousedown', () => {
        if(isGameRunning) keys.throw = true;
    });
    canvas.addEventListener('mouseup', () => {
        keys.throw = false;
    });

    overlay.classList.remove('hidden');

</script>
